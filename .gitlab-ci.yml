image: eclipse-temurin:17-jdk-jammy

variables:
  ANDROID_COMPILE_SDK: "37"
  ANDROID_BUILD_TOOLS: "37.0.0"
  ANDROID_NDK_VERSION: "29.0.14206865"
  ANDROID_CMDLINE_TOOLS_VERSION: "13114758"
  ANDROID_HOME: "$CI_PROJECT_DIR/.android-sdk"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

default:
  before_script:
    - apt-get update -qq && apt-get install -y -qq wget unzip
    - export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools"
    - |
      if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
        wget -q "https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_CMDLINE_TOOLS_VERSION}_latest.zip" -O cmdline-tools.zip
        mkdir -p "$ANDROID_HOME/cmdline-tools"
        unzip -q cmdline-tools.zip -d "$ANDROID_HOME/cmdline-tools"
        mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
        rm cmdline-tools.zip
      fi
    - yes | sdkmanager --licenses > /dev/null
    - sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}" "platform-tools" "build-tools;${ANDROID_BUILD_TOOLS}" "ndk;${ANDROID_NDK_VERSION}" > /dev/null
    - |
      if [ -n "${KEYSTORE_BASE64:-}" ] && [ -n "${SECRETS_BASE64:-}" ]; then
        echo "${KEYSTORE_BASE64}" | base64 -d > keystore.jks
        echo "${SECRETS_BASE64}" | base64 -d > secrets.properties
      fi
    - if [ ! -f secrets.properties ]; then echo "PROXER_API_KEY=dummy_build_key" > secrets.properties; fi
    - chmod +x ./gradlew

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/wrapper
    - .gradle/caches
    - .android-sdk

stages:
  - check
  - build

detekt:
  stage: check
  script:
    - ./gradlew detekt
  artifacts:
    when: always
    paths:
      - build/reports/detekt
    expire_in: 1 week

unit-tests:
  stage: check
  script:
    - ./gradlew testDebugUnitTest
  artifacts:
    when: always
    paths:
      - build/test-results
    reports:
      junit: build/test-results/testDebugUnitTest/TEST-*.xml
    expire_in: 1 week

assembleDebug:
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - ./gradlew assembleDebug --max-workers 1
  artifacts:
    paths:
      - build/outputs/apk/debug/*.apk
    expire_in: 1 week

assembleRelease:
  stage: build
  rules:
    - when: manual
  script:
    - ./gradlew assembleRelease
  artifacts:
    paths:
      - build/outputs/apk/release/*.apk
    expire_in: 1 month
