name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install secrets
        run: .github/workflows/create-secrets.sh
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SECRETS: ${{ secrets.SECRETS }}

      - name: Fallback secrets for fork PRs
        run: |
          if [ ! -f secrets.properties ]; then
            echo "PROXER_API_KEY=dummy_build_key" > secrets.properties
          fi

      - name: detekt
        run: ./gradlew detekt
        continue-on-error: true

      - name: Detekt summary
        if: always()
        run: |
          if [ -f build/reports/detekt/detekt.md ]; then
            cat build/reports/detekt/detekt.md >> $GITHUB_STEP_SUMMARY
          fi

  unit-tests:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install secrets
        run: .github/workflows/create-secrets.sh
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SECRETS: ${{ secrets.SECRETS }}

      - name: Fallback secrets for fork PRs
        run: |
          if [ ! -f secrets.properties ]; then
            echo "PROXER_API_KEY=dummy_build_key" > secrets.properties
          fi

      - name: Unit tests
        run: ./gradlew test --no-daemon --max-workers 2

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: UnitTestReports
          path: build/reports/tests

  instrumented-tests:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install secrets
        run: .github/workflows/create-secrets.sh
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SECRETS: ${{ secrets.SECRETS }}

      - name: Fallback secrets for fork PRs
        run: |
          if [ ! -f secrets.properties ]; then
            echo "PROXER_API_KEY=dummy_build_key" > secrets.properties
          fi

      - name: Instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # API 31 is the floor for this suite, not a preference. mockk-android's agent instruments
          # Object.toString(), which Espresso calls on every Activity launch; resolving
          # ComponentActivity.onPictureInPictureUiStateChanged's parameter type then requires
          # android.app.PictureInPictureUiState, added in API 31. On API 30 that throws
          # NoClassDefFoundError and crashes the whole instrumentation process. Verified 2026-07-15:
          # API 30 dies after 1/23 tests; API 31 passes 23/23.
          api-level: 31
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew connectedDebugAndroidTest --no-daemon --max-workers 2

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: InstrumentedTestReports
          path: build/outputs/androidTest-results

  assemble-debug:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install secrets
        run: .github/workflows/create-secrets.sh
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SECRETS: ${{ secrets.SECRETS }}

      - name: Fallback secrets for fork PRs
        run: |
          if [ ! -f secrets.properties ]; then
            echo "PROXER_API_KEY=dummy_build_key" > secrets.properties
          fi

      - name: Assemble debug
        run: ./gradlew assembleDebug --no-daemon --max-workers 1

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: DebugApk
          path: build/outputs/apk/debug/*.apk

  assemble-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install secrets
        run: .github/workflows/create-secrets.sh
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SECRETS: ${{ secrets.SECRETS }}

      - name: Assemble release
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: ReleaseApk
          path: build/outputs/apk/release/*.apk
