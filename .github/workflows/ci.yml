name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  analysis:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install secrets
        run: .github/workflows/create-secrets.sh
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SECRETS: ${{ secrets.SECRETS }}

      - name: Fallback secrets for fork PRs
        run: |
          if [ ! -f secrets.properties ]; then
            echo "PROXER_API_KEY=dummy_build_key" > secrets.properties
          fi

      - name: detekt
        run: ./gradlew detekt
        continue-on-error: true

      - name: Detekt summary
        if: always()
        run: |
          if [ -f build/reports/detekt/detekt.md ]; then
            cat build/reports/detekt/detekt.md >> $GITHUB_STEP_SUMMARY
          fi

  build:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        include:
          - variant: debug
            gradle_args: "build assembleDebug --no-daemon"
          - variant: release
            gradle_args: "build assembleRelease --no-daemon"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install secrets
        run: .github/workflows/create-secrets.sh
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SECRETS: ${{ secrets.SECRETS }}

      - name: Fallback secrets for fork PRs
        run: |
          if [ ! -f secrets.properties ]; then
            echo "PROXER_API_KEY=dummy_build_key" > secrets.properties
          fi

      - name: Build (${{ matrix.variant }})
        run: ./gradlew ${{ matrix.gradle_args }}

      - name: Store reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Reports-${{ matrix.variant }}
          path: build/reports

      - name: Store outputs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Outputs-${{ matrix.variant }}
          path: build/outputs

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install secrets
        run: .github/workflows/create-secrets.sh
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SECRETS: ${{ secrets.SECRETS }}

      - name: Fallback secrets for fork PRs
        run: |
          if [ ! -f secrets.properties ]; then
            echo "PROXER_API_KEY=dummy_build_key" > secrets.properties
          fi

      - name: Unit tests
        run: ./gradlew test --no-daemon --max-workers 2

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: UnitTestReports
          path: build/reports/tests

  instrumented-tests:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install secrets
        run: .github/workflows/create-secrets.sh
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SECRETS: ${{ secrets.SECRETS }}

      - name: Fallback secrets for fork PRs
        run: |
          if [ ! -f secrets.properties ]; then
            echo "PROXER_API_KEY=dummy_build_key" > secrets.properties
          fi

      - name: Instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew connectedDebugAndroidTest --no-daemon --max-workers 2

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: InstrumentedTestReports
          path: build/outputs/androidTest-results
