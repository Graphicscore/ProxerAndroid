name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install secrets
        run: .github/workflows/create-secrets.sh
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SECRETS: ${{ secrets.SECRETS }}

      - name: Fallback secrets for fork PRs
        run: |
          if [ ! -f secrets.properties ]; then
            echo "PROXER_API_KEY=dummy_build_key" > secrets.properties
          fi

      - id: build
        name: Build with Gradle
        run: ./gradlew ktlintCheck detekt build bundle --no-daemon

      - name: Store reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Reports
          path: build/reports

      - name: Store outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Outputs
          path: build/outputs
