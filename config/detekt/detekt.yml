complexity:
  active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
  # pre-existing violations, detekt 2.x now catches these
  SwallowedException:
    active: false
  TooGenericExceptionThrown:
    active: false

ktlint:
  active: true
  excludes:
    - "**/me/zhanghai/**"
    - "**/com/gojuno/**"
    - "**/androidx/recyclerview/widget/BindAwareViewHolder.kt"
  MaximumLineLength:
    active: true
    maxLineLength: 120
  # detekt-rules-ktlint-wrapper 2.0.0-alpha.5 hardcodes FunctionNamingRule's
  # IGNORE_WHEN_ANNOTATED_WITH_PROPERTY override to "", so .editorconfig's
  # ktlint_function_naming_ignore_when_annotated_with is never read - @Composable
  # PascalCase functions can't be excluded short of disabling the rule outright.
  FunctionName:
    active: false

naming:
  FunctionNaming:
    active: false

performance:
  SpreadOperator:
    active: false

style:
  MagicNumber:
    active: false
  ForbiddenComment:
    active: false
  # pre-existing violations, detekt 2.x now catches these
  MaxLineLength:
    active: false
  UnusedParameter:
    active: false
  ExplicitItLambdaMultipleParameters:
    active: false
  DestructuringDeclarationWithTooManyEntries:
    active: false
  ThrowsCount:
    active: false
